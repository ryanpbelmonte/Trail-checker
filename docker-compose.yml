# Course 506 Week 5 Skeleton — two-container app.
#
# Run with: docker compose up
# The Flask app will be available at http://localhost:5000
#
# The two services:
#   app — Flask, talks to the database via the hostname "db"
#   db  — Postgres, holds the users table
#
# In production you'd run Postgres on a managed service (RDS, etc.) instead of
# in a container, but Compose mirrors that architecture closely.

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      # DATABASE_URL is non-secret and benefits from being explicit. Secrets
      # (SECRET_KEY, OPENWEATHER_API_KEY, etc.) come from .env only so they
      # are not committed in docker-compose.yml.
      DATABASE_URL: postgresql://app:app@db:5432/app
    env_file:
      # .env is gitignored and is the single source of truth for secrets.
      # The stack refuses to start if it is missing — see .env.example for
      # the template and README.md for required variables.
      - path: .env
        required: true
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount the source so changes are picked up without rebuilding.
      # Flask's debug mode auto-reloads on file changes.
      - .:/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 2s
      timeout: 2s
      retries: 10

volumes:
  pgdata:
