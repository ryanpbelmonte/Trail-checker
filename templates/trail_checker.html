{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1 class="mb-3">Trail Checker</h1>
        <p class="text-muted">
            Search for a trailhead or outdoor location to see current weather and air quality.
        </p>

        <form method="GET" action="/trail-checker/results" class="mb-4">
            <div class="input-group">
                <input
                    type="text"
                    name="q"
                    class="form-control"
                    placeholder="e.g. Mount Rainier"
                    value="{{ query_text or '' }}"
                    required
                >
                <button type="submit" class="btn btn-primary">Check conditions</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
